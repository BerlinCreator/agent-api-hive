  /v1/qr/generate:
    post:
      summary: Generate a QR code image from input data.
      description: >-
        Use this for payments, links, event check-ins, onboarding flows, or device pairing. The request body uses data
        rather than text, supports output styling options, and the API returns raw image bytes instead of JSON.
      operationId: GenerateQRCodeCommodity
      tags:
        - Commodity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: Binary image response (PNG or SVG bytes). This endpoint does not return JSON.
        '400':
          description: Bad request — check error.message for details
          content:
            application/json:
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid input
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              example:
                success: false
                error:
                  code: AUTH_ERROR
                  message: Invalid API key.
        '429':
          description: Rate limit exceeded — daily quota reached
          content:
            application/json:
              example:
                success: false
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: Daily request limit reached.
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                success: false
                error:
                  code: INTERNAL_ERROR
                  message: An unexpected error occurred
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: The string payload to encode into the QR code.
                size:
                  type: string
                  description: Optional output size in pixels.
                format:
                  type: string
                  description: Optional output format.
                errorCorrection:
                  type: string
                  description: Optional QR error correction level.
                color:
                  type: string
                  description: 'Optional foreground color such as #000000.'
                background:
                  type: string
                  description: 'Optional background color such as #ffffff.'
              required:
                - data
  /v1/qr/barcode:
