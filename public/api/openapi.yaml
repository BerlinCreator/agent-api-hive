        content:
          application/json:
            schema:
              type: object
              properties: {}
              required:
                - data
  /v1/pdf/split:
    post:
      summary: Split a PDF by page selection.
      description: >-
        Use it when agents need to carve a large document into smaller deliverables or extract only the relevant pages.
