            example: |-
              curl -X POST 'https://api.agentapihive.com/v1/image/metadata' \
                -H 'x-api-key: YOUR_API_KEY' \
                -F 'file=@photo.jpg'
  /v1/pdf/merge:
    post:
      summary: Merge multiple PDF URLs into one document.
      description: >-
        Handy for invoice packets, report assembly, and document bundles. Provide an ordered array of PDF URLs and the
