                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid input
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              example:
                success: false
                error:
                  code: AUTH_ERROR
                  message: Invalid API key.
        '429':
          description: Rate limit exceeded — daily quota reached
          content:
            application/json:
              example:
                success: false
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: Daily request limit reached.
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                success: false
                error:
                  code: INTERNAL_ERROR
                  message: An unexpected error occurred
