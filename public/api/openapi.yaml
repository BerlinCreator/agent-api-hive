openapi: 3.0.3
info:
  title: Agent API Hive
  description: |-
    76 APIs for AI agent builders. One API key. One subscription. Every tool an AI agent needs.

    Sign up free at https://agentapihive.com

    ## Authentication
    Include your API key in every request header:
    ```
    x-api-key: YOUR_API_KEY
    ```

    ## Rate Limits (by tier)
    | Tier | Daily |
    |------|-------|
    | Free | 100 |
    | Starter | 1,000 |
    | Plus | 5,000 |
    | Pro | 10,000 |
    | Enterprise | Unlimited |

    ## Error Codes
    | Code | Meaning |
    |------|--------|
    | AUTH_ERROR | Missing or invalid API key |
    | VALIDATION_ERROR | Request body failed validation |
    | RATE_LIMIT_EXCEEDED | Daily quota exhausted |
    | INTERNAL_ERROR | Unexpected server error |
  version: 1.0.0
  contact:
    name: Agent API Hive
    url: https://agentapihive.com
    email: support@agentapihive.com
servers:
  - url: https://agent-utility-belt-production.up.railway.app
    description: Production
paths:
  /v1/image/resize:
    post:
      summary: Resize an uploaded image and return the transformed file.
      description: >-
        Use this when an agent needs a resized asset for thumbnails, OG images, profile pictures, or downstream storage.
        The endpoint accepts a multipart file upload plus sizing options in query params and returns raw image bytes
        rather than JSON.
      operationId: ResizeImageCommodity
      tags:
        - Commodity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: Binary image response (image/png bytes). Save the response body directly to a file.
        '400':
          description: Bad request — check error.message for details
          content:
            application/json:
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid input
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              example:
                success: false
                error:
                  code: AUTH_ERROR
                  message: Invalid API key.
        '429':
          description: Rate limit exceeded — daily quota reached
          content:
            application/json:
              example:
                success: false
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: Daily request limit reached.
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                success: false
                error:
                  code: INTERNAL_ERROR
                  message: An unexpected error occurred
      parameters:
        - name: width
          in: query
          required: true
          schema:
            type: string
          description: Target width in pixels.
        - name: height
          in: query
          required: false
          schema:
            type: string
          description: Optional target height in pixels.
        - name: quality
          in: query
          required: false
          schema:
            type: string
          description: Optional output quality for lossy formats.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Source image uploaded as multipart form data.
                fit:
                  type: string
                  description: Optional resize fit mode when both width and height matter.
                format:
                  type: string
                  description: Optional output format override.
              required:
                - file
            example: |-
              curl -X POST 'https://api.agentapihive.com/v1/image/resize?width=1200&height=630&fit=cover&format=png' \
                -H 'x-api-key: YOUR_API_KEY' \
                -F 'file=@hero.jpg' \
                --output resized.png
  /v1/image/compress:
    post:
      summary: Compress an uploaded image and return the smaller file.
      description: >-
        Best for shrinking screenshots, product photos, and generated assets before storage or delivery. Send the image
        as multipart form data, optionally tune quality and format via query params, and expect raw binary output
        instead of a JSON envelope.
      operationId: CompressImageCommodity
      tags:
        - Commodity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: Binary image response (for example image/webp bytes).
        '400':
          description: Bad request — check error.message for details
          content:
            application/json:
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid input
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              example:
                success: false
                error:
                  code: AUTH_ERROR
                  message: Invalid API key.
        '429':
          description: Rate limit exceeded — daily quota reached
          content:
            application/json:
              example:
                success: false
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: Daily request limit reached.
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                success: false
                error:
                  code: INTERNAL_ERROR
                  message: An unexpected error occurred
      parameters:
        - name: quality
          in: query
          required: false
          schema:
            type: string
          description: Optional compression quality, usually from 1 to 100.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Source image uploaded as multipart form data.
                format:
                  type: string
                  description: Optional output format conversion while compressing.
              required:
                - file
            example: |-
              curl -X POST 'https://api.agentapihive.com/v1/image/compress?quality=72&format=webp' \
                -H 'x-api-key: YOUR_API_KEY' \
                -F 'file=@banner.png' \
                --output compressed.webp
  /v1/image/convert:
    post:
      summary: Convert an uploaded image into another format.
      description: >-
        Use this when workflows need to standardize assets into PNG, JPEG, WebP, or another supported format. The image
        is uploaded as multipart form data, conversion options are passed in query params, and the endpoint returns raw
        image bytes.
      operationId: ConvertImageCommodity
      tags:
        - Commodity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: Binary image response in the requested format.
        '400':
          description: Bad request — check error.message for details
          content:
            application/json:
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid input
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              example:
                success: false
                error:
                  code: AUTH_ERROR
                  message: Invalid API key.
        '429':
          description: Rate limit exceeded — daily quota reached
          content:
            application/json:
              example:
                success: false
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: Daily request limit reached.
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                success: false
                error:
                  code: INTERNAL_ERROR
                  message: An unexpected error occurred
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
          description: Required destination format such as png, jpeg, or webp.
        - name: quality
          in: query
          required: false
          schema:
            type: string
          description: Optional quality value for lossy output formats.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Source image uploaded as multipart form data.
              required:
                - file
            example: |-
              curl -X POST 'https://api.agentapihive.com/v1/image/convert?format=webp&quality=80' \
                -H 'x-api-key: YOUR_API_KEY' \
                -F 'file=@asset.png' \
                --output asset.webp
  /v1/image/watermark:
    post:
      summary: Apply a text watermark to an uploaded image.
      description: >-
        Useful for branding exports, drafts, review proofs, or marketplace assets. Upload the source image as multipart
        form data, provide watermark options in the request body, and the API returns the final image as raw binary
        bytes.
      operationId: WatermarkImageCommodity
      tags:
        - Commodity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: Binary image response with the watermark applied.
        '400':
          description: Bad request — check error.message for details
          content:
            application/json:
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid input
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              example:
                success: false
                error:
                  code: AUTH_ERROR
                  message: Invalid API key.
        '429':
          description: Rate limit exceeded — daily quota reached
          content:
            application/json:
              example:
                success: false
                error:
                  code: RATE_LIMIT_EXCEEDED
                  message: Daily request limit reached.
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                success: false
                error:
                  code: INTERNAL_ERROR
                  message: An unexpected error occurred
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Source image uploaded as multipart form data.
                text:
                  type: string
                  description: Watermark text to place on the image.
                position:
                  type: string
                  description: Optional placement of the watermark.
                opacity:
                  type: string
                  description: Optional watermark opacity from transparent to opaque.
                fontSize:
                  type: string
                  description: Optional font size in pixels.
              required:
                - file
                - text
            example: |-
              curl -X POST 'https://api.agentapihive.com/v1/image/watermark' \
                -H 'x-api-key: YOUR_API_KEY' \
                -F 'file=@product.jpg' \
                -F 'text=Agent API Hive' \
                -F 'position=bottom-right' \
                -F 'opacity=0.45' \
                -F 'fontSize=28' \
                --output watermarked.jpg
  /v1/image/metadata:
    post:
      summary: Inspect an uploaded image and return metadata as JSON.
      description: >-
        Use this when you need dimensions, size, format, or related properties before further processing. Unlike the
        other image endpoints, this one still uses multipart upload but returns structured JSON metadata instead of
        binary bytes.
      operationId: ImageMetadataCommodity
      tags:
        - Commodity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                success: true
                data:
                  message: ok
        '400':
          description: Bad request — check error.message for details
          content:
            application/json:
              example:
                success: false
                error:
