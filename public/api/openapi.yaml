      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: Payload to encode in the barcode.
                type:
                  type: string
                  description: Optional barcode symbology.
                scale:
                  type: string
                  description: Optional barcode scale multiplier.
                height:
                  type: string
                  description: Optional barcode height.
                includetext:
                  type: string
                  description: Whether to render readable text below the barcode.
              required:
