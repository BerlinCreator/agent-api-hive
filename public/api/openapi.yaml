            example: |-
              curl -X POST 'https://api.agentapihive.com/v1/qr/decode' \
                -H 'x-api-key: YOUR_API_KEY' \
                -F 'file=@qr.png'
  /v1/email/validate:
    post:
      summary: Validate one email address.
      description: >-
        Use this before signups, lead imports, or outbound workflows to catch typos, disposable domains, and DNS issues.
